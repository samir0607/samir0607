name: Profile animations

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */12 * * *"

permissions:
  contents: write

jobs:
  snake:
    runs-on: ubuntu-latest
    steps:
      - name: Generate contribution snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark

      - name: Publish snake to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  profile-3d:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate 3D contribution profile
        uses: yoshi389111/github-profile-3d-contrib@0.9.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}

      - name: Commit generated 3D profile
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update profile animations"
          file_pattern: profile-3d-contrib/*.svg

  bill-card:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate dev receipt card
        env:
          GH_USERNAME: samir0607
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LEETCODE_USER: samir02_07
          CODEFORCES_HANDLE: samir02_07
          CODECHEF_HANDLE: samir0607
          BILL_NAME: "Samir Gupta"
          BILL_AGE: "22"
          BILL_HEIGHT: "5'10\""
          BILL_WEIGHT: "78 kg"
          OUTPUT_PATH: assets/bill-card.svg
        run: node scripts/generate-bill-card.mjs

      - name: Commit updated dev receipt card
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update dev receipt card"
          file_pattern: assets/bill-card.svg
