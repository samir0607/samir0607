<svg xmlns="http://www.w3.org/2000/svg" width="108" height="108" viewBox="0 0 108 108" role="img" aria-label="Instagram">
  <defs>
    <linearGradient id="fill" x1="10" y1="102" x2="98" y2="6">
      <stop offset="0%" stop-color="#FEDA75"/>
      <stop offset="25%" stop-color="#FA7E1E"/>
      <stop offset="50%" stop-color="#D62976"/>
      <stop offset="75%" stop-color="#962FBF"/>
      <stop offset="100%" stop-color="#4F5BD5"/>
    </linearGradient>
    <radialGradient id="sheen" cx="32%" cy="18%" r="55%">
      <stop stop-color="#ffffff" stop-opacity=".45"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-40%" y="-40%" width="180%" height="200%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#0b0b12" flood-opacity=".55"/>
    </filter>
    <filter id="glyphShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.5" flood-color="#000000" flood-opacity=".45"/>
    </filter>
  </defs>
  <g filter="url(#shadow)">
    <rect x="8" y="8" width="92" height="92" rx="30" fill="url(#fill)"/>
    <rect x="8" y="8" width="92" height="92" rx="30" fill="url(#sheen)"/>
    <g filter="url(#glyphShadow)">
      <rect x="32" y="32" width="44" height="44" rx="14" fill="none" stroke="#fff" stroke-width="6"/>
      <circle cx="54" cy="54" r="10" fill="none" stroke="#fff" stroke-width="6"/>
      <circle cx="68" cy="39" r="3.8" fill="#fff"/>
    </g>
  </g>
</svg>
